mappers:
  package: mappings
  destination: ./internal/mappings/mappers_gen.go

mappings:
  - id: budgeting_system/internal/mappings.TransactionMapper
    name: TransactionMapper
    package: mappings
    destination: ./internal/mappings/transaction_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/gen/budgy/v1
      name: UpdateTransactionRequest
    b:
      package: ./internal/domain
      name: Transaction
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: Date
        b: Date
        converter: TimestampConverter
      - a: PostDate
        b: PostDate
        converter: TimestampConverter

  - id: budgeting_system/internal/mappings.UserMapper
    name: UserMapper
    package: mappings
    destination: ./internal/mappings/user_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/domain
      name: User
    b:
      package: ./internal/gen/budgy/v1
      name: User
    a-to-b: ToProto
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ID
        b: Id
      - a: BasiqUserID
        b: BasiqUserId
      - a: CreatedAt
        b: CreatedAt
        converter: TimestampConverter
      - a: UpdatedAt
        b: UpdatedAt
        converter: TimestampConverter

  - id: budgeting_system/internal/mappings.BudgetMapper
    name: BudgetMapper
    package: mappings
    destination: ./internal/mappings/budget_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/domain
      name: Budget
    b:
      package: ./internal/gen/budgy/v1
      name: Budget
    a-to-b: ToProto
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ID
        b: Id
      - a: UserID
        b: UserId
      - a: Method
        b: Method
        converter: EnumConverter
      - a: Period
        b: Period
        converter: EnumConverter
      - a: StartDate
        b: StartDate
      - a: CreatedAt
        b: CreatedAt
        converter: TimestampConverter
      - a: UpdatedAt
        b: UpdatedAt
        converter: TimestampConverter

  - id: budgeting_system/internal/mappings.AccountMapper
    name: AccountMapper
    package: mappings
    destination: ./internal/mappings/account_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/domain
      name: Account
    b:
      package: ./internal/gen/budgy/v1
      name: Account
    a-to-b: ToProto
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ID
        b: Id
      - a: UserID
        b: UserId
      - a: Type
        b: Type
        converter: EnumConverter
      - a: CreatedAt
        b: CreatedAt
        converter: TimestampConverter
      - a: UpdatedAt
        b: UpdatedAt
        converter: TimestampConverter
      - a: InstitutionID
        b: InstitutionId
      - a: ConnectionID
        b: ConnectionId
      - a: LastUpdated
        b: LastUpdated
        converter: TimestampConverter

  - id: budgeting_system/internal/mappings.CategoryMapper
    name: CategoryMapper
    package: mappings
    destination: ./internal/mappings/category_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/domain
      name: Category
    b:
      package: ./internal/gen/budgy/v1
      name: Category
    a-to-b: ToProto
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ID
        b: Id
      - a: UserID
        b: UserId
      - a: ParentID
        b: ParentId
      - a: Type
        b: Type
        converter: EnumConverter
      - a: BasiqSubClassCode
        b: BasiqSubclassCode
      - a: AnzsicClassCode
        b: AnzsicClassCode
      - a: SortOrder
        b: SortOrder
      - a: CreatedAt
        b: CreatedAt
        converter: TimestampConverter
      - a: UpdatedAt
        b: UpdatedAt
        converter: TimestampConverter

  - id: budgeting_system/internal/mappings.TransactionProtoMapper
    name: TransactionProtoMapper
    package: mappings
    destination: ./internal/mappings/transaction_proto_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/domain
      name: Transaction
    b:
      package: ./internal/gen/budgy/v1
      name: Transaction
    a-to-b: ToProto
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ID
        b: Id
      - a: BudgetID
        b: BudgetId
      - a: AccountID
        b: AccountId
      - a: CategoryID
        b: CategoryId
      - a: Date
        b: Date
        converter: TimestampConverter
      - a: CreatedAt
        b: CreatedAt
        converter: TimestampConverter
      - a: UpdatedAt
        b: UpdatedAt
        converter: TimestampConverter
      - a: PostDate
        b: PostDate
        converter: TimestampConverter
      - a: MerchantLogoURL
        b: MerchantLogoUrl

  - id: budgeting_system/internal/mappings.DBTransactionMapper
    name: DBTransactionMapper
    package: mappings
    destination: ./internal/mappings/db_transaction_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: Transaction
    b:
      package: ./internal/domain
      name: Transaction
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: CategoryID
        b: CategoryID
        converter: NullStringConverter
      - a: Direction
        b: Direction
        converter: NullStringConverter
      - a: Status
        b: Status
        converter: NullStringConverter
      - a: Class
        b: Class
        converter: NullStringConverter
      - a: PostDate
        b: PostDate
        converter: NullTimeConverter
      - a: SubClass
        b: SubClass
        converter: NullStringConverter
      - a: RawDescription
        b: RawDescription
        converter: NullStringConverter
      - a: MerchantName
        b: MerchantName
        converter: NullStringConverter
      - a: MerchantWebsite
        b: MerchantWebsite
        converter: NullStringConverter
      - a: MerchantLogoUrl
        b: MerchantLogoURL
        converter: NullStringConverter
      - a: LocationAddress
        b: LocationAddress
        converter: NullStringConverter
      - a: LocationLat
        b: LocationLat
        converter: NullStringConverter
      - a: LocationLng
        b: LocationLng
        converter: NullStringConverter
      - a: CategoryCode
        b: CategoryCode
        converter: NullStringConverter
      - a: CategoryTitle
        b: CategoryTitle
        converter: NullStringConverter

  - id: budgeting_system/internal/mappings.DBUserMapper
    name: DBUserMapper
    package: mappings
    destination: ./internal/mappings/db_user_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: User
    b:
      package: ./internal/domain
      name: User
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: BasiqUserID
        b: BasiqUserID
        converter: NullStringConverter

  - id: budgeting_system/internal/mappings.DBBudgetMapper
    name: DBBudgetMapper
    package: mappings
    destination: ./internal/mappings/db_budget_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: Budget
    b:
      package: ./internal/domain
      name: Budget
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: UserID
        b: UserID
        converter: NullStringConverter

  - id: budgeting_system/internal/mappings.DBAccountMapper
    name: DBAccountMapper
    package: mappings
    destination: ./internal/mappings/db_account_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: Account
    b:
      package: ./internal/domain
      name: Account
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: UserID
        b: UserID
      - a: Class
        b: Class
        converter: NullStringConverter
      - a: AccountNo
        b: AccountNo
        converter: NullStringConverter
      - a: AvailableFunds
        b: AvailableFunds
        converter: NullInt64Converter
      - a: Product
        b: Product
        converter: NullStringConverter
      - a: InstitutionID
        b: InstitutionID
        converter: NullStringConverter
      - a: ConnectionID
        b: ConnectionID
        converter: NullStringConverter
      - a: LastUpdated
        b: LastUpdated
        converter: NullTimeConverter

  - id: budgeting_system/internal/mappings.DBCategoryMapper
    name: DBCategoryMapper
    package: mappings
    destination: ./internal/mappings/db_category_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: Category
    b:
      package: ./internal/domain
      name: Category
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ParentID
        b: ParentID
        converter: NullStringConverter
      - a: Icon
        b: Icon
        converter: NullStringConverter
      - a: BasiqSubclassCode
        b: BasiqSubClassCode
        converter: NullStringConverter
      - a: AnzsicClassCode
        b: AnzsicClassCode
        converter: NullStringConverter

  - id: budgeting_system/internal/mappings.DBJobMapper
    name: DBJobMapper
    package: mappings
    destination: ./internal/mappings/db_job_mapper_gen.go
    bidirectional: false
    a:
      package: ./internal/storage/db
      name: BackgroundJob
    b:
      package: ./internal/domain
      name: Job
    ignore-case: true
    allow-unmapped: true
    fields:
      - a: ErrorMessage
        b: ErrorMessage
        ignore: true

