version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgeting-system-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=/app/data/budget.db
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
