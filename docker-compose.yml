services:
  backend:
    image: budgeting_system_backend:latest
    container_name: budgeting-system-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=/app/data/budget.db
      - ALLOWED_ORIGINS=http://localhost:3000
      - BASIQ_API_KEY=${BASIQ_API_KEY}
      - LOG_LEVEL=debug
    volumes:
      - ./data:/app/data
    restart: unless-stopped
