syntax = "proto3";

package budgy.v1;

option go_package = "budgeting_system/internal/gen/budgy/v1;budgyv1";

import "google/protobuf/timestamp.proto";

// ─── Messages ────────────────────────────────────────────────────────────────

message Transaction {
  string id              = 1;
  string budget_id       = 2;
  string account_id      = 3;
  string category_id     = 4;
  int64  amount          = 5;
  string description     = 6;
  google.protobuf.Timestamp date       = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string direction        = 10;
  string status           = 11;
  string class            = 12;
  optional google.protobuf.Timestamp post_date = 13;
  string sub_class        = 14;
  string raw_description  = 15;
  string merchant_name    = 16;
}

// ─── Requests / Responses ─────────────────────────────────────────────────────

message CreateTransactionRequest {
  string budget_id    = 1;
  string account_id   = 2;
  string category_id  = 3;
  int64  amount       = 4;
  string description  = 5;
  google.protobuf.Timestamp date = 6;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message ListTransactionsRequest {
  string budget_id = 1;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}

message UpdateTransactionRequest {
  string budget_id        = 1;
  string transaction_id   = 2;
  optional string account_id      = 3;
  optional string category_id     = 4;
  optional int64  amount          = 5;
  optional string description     = 6;
  optional google.protobuf.Timestamp date = 7;
  optional string direction       = 8;
  optional string status          = 9;
  optional string class           = 10;
  optional google.protobuf.Timestamp post_date = 11;
  optional string sub_class       = 12;
  optional string raw_description = 13;
  optional string merchant_name   = 14;
}

message UpdateTransactionResponse {
  Transaction transaction = 1;
}

message DeleteTransactionRequest {
  string budget_id      = 1;
  string transaction_id = 2;
}

message DeleteTransactionResponse {}

// ─── Service ──────────────────────────────────────────────────────────────────

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest)   returns (ListTransactionsResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (UpdateTransactionResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (DeleteTransactionResponse);
}
