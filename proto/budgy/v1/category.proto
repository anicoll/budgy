syntax = "proto3";

package budgy.v1;

option go_package = "budgeting_system/internal/gen/budgy/v1;budgyv1";

import "google/protobuf/timestamp.proto";

enum CategoryType {
  CATEGORY_TYPE_UNSPECIFIED = 0;
  CATEGORY_TYPE_INCOME      = 1;
  CATEGORY_TYPE_EXPENSE     = 2;
  CATEGORY_TYPE_TRANSFER    = 3;
}

enum BudgetFrequency {
  BUDGET_FREQUENCY_UNSPECIFIED = 0;
  BUDGET_FREQUENCY_WEEKLY      = 1;
  BUDGET_FREQUENCY_FORTNIGHTLY = 2;
  BUDGET_FREQUENCY_MONTHLY     = 3;
  BUDGET_FREQUENCY_QUARTERLY   = 4;
  BUDGET_FREQUENCY_YEARLY      = 5;
}

message Category {
  string id           = 1;
  string user_id      = 2;
  string parent_id    = 3;
  string name         = 4;
  CategoryType type   = 5;
  string color        = 6;
  string icon         = 7;
  int32  sort_order   = 8;
  bool   archived     = 9;
  bool   system       = 10;
  string basiq_subclass_code = 11;
  string anzsic_class_code   = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message BudgetCategory {
  Category category     = 1;
  int64    budgeted     = 2;
  int64    balance      = 3;
  int64    target_limit = 4;
  BudgetFrequency budgeted_frequency = 5;
}

message FundEnvelopeResult {
  string account_id      = 1;
  int64  account_balance = 2;
  BudgetCategory envelope = 3;
}

message CreateCategoryRequest {
  string name      = 1;
  CategoryType type = 2;
  string parent_id = 3;
  string color     = 4;
  string icon      = 5;
  int32  sort_order = 6;
}

message CreateCategoryResponse {
  Category category = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message UpdateCategoryRequest {
  string category_id  = 1;
  optional string name         = 2;
  optional CategoryType type   = 3;
  optional string parent_id    = 4;
  optional string color        = 5;
  optional string icon         = 6;
  optional int32  sort_order   = 7;
  optional bool   archived     = 8;
}

message UpdateCategoryResponse {
  Category category = 1;
}

message DeleteCategoryRequest {
  string category_id = 1;
}

message DeleteCategoryResponse {}

service CategoryService {
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
}
