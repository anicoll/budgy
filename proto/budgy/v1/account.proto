syntax = "proto3";

package budgy.v1;

option go_package = "budgeting_system/internal/gen/budgy/v1;budgyv1";

import "google/protobuf/timestamp.proto";

enum AccountType {
  ACCOUNT_TYPE_UNSPECIFIED  = 0;
  ACCOUNT_TYPE_CHECKING     = 1;
  ACCOUNT_TYPE_SAVINGS      = 2;
  ACCOUNT_TYPE_CREDIT_CARD  = 3;
  ACCOUNT_TYPE_CASH         = 4;
}

message Account {
  string      id              = 1;
  string      user_id         = 2;
  string      name            = 3;
  AccountType type            = 4;
  int64       balance         = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string      class           = 8;
  string      account_no      = 9;
  optional int64 available_funds = 10;
  string      product         = 11;
  string      institution_id  = 12;
  string      connection_id   = 13;
  optional google.protobuf.Timestamp last_updated = 14;
}

message CreateAccountRequest {
  string      name    = 1;
  AccountType type    = 2;
  int64       balance = 3;
}

message CreateAccountResponse {
  Account account = 1;
}

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

message UpdateAccountRequest {
  string      account_id      = 1;
  optional string name            = 2;
  optional AccountType type       = 3;
  optional int64  balance         = 4;
  optional string class           = 5;
  optional string account_no      = 6;
  optional int64  available_funds = 7;
  optional string product         = 8;
  optional string institution_id  = 9;
  optional string connection_id   = 10;
  optional google.protobuf.Timestamp last_updated = 11;
}

message UpdateAccountResponse {
  Account account = 1;
}

message DeleteAccountRequest {
  string account_id = 1;
}

message DeleteAccountResponse {}

message LinkAccountToBudgetRequest {
  string budget_id  = 1;
  string account_id = 2;
}

message LinkAccountToBudgetResponse {}

message UnlinkAccountFromBudgetRequest {
  string budget_id  = 1;
  string account_id = 2;
}

message UnlinkAccountFromBudgetResponse {}

message ListBudgetAccountsRequest {
  string budget_id = 1;
}

message ListBudgetAccountsResponse {
  repeated Account accounts = 1;
}

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc ListAccounts(ListAccountsRequest)   returns (ListAccountsResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
  rpc LinkAccountToBudget(LinkAccountToBudgetRequest) returns (LinkAccountToBudgetResponse);
  rpc UnlinkAccountFromBudget(UnlinkAccountFromBudgetRequest) returns (UnlinkAccountFromBudgetResponse);
  rpc ListBudgetAccounts(ListBudgetAccountsRequest) returns (ListBudgetAccountsResponse);
}
